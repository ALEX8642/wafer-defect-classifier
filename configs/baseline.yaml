# baseline.yaml — shared config for all machines.
#
# Batch size guidance:
#   4090 laptop  (24 GB VRAM): batch_size: 64
#   5090 desktop (32 GB VRAM): batch_size: 128  ← default
# Override at runtime: python -m wafer.train --batch-size 64

data_root: data/raw          # relative to repo root; anchored to REPO_ROOT at load time
output_dir: outputs          # checkpoints, logs, plots
batch_size: 128
num_workers: 4               # set to 0 on Windows if multiprocessing errors
seed: 42
num_epochs: 30
lr: 1.0e-3
weight_decay: 1.0e-4
input_size: 224              # square resize target for wafer maps
device: auto                 # "auto" → cuda if available else cpu; or "cuda"/"cpu"/"mps"

# Phase 1 — model
arch: resnet18               # resnet18 | resnet50
pretrained: false            # ImageNet weights transfer weakly to binned wafer maps;
                             # keep false for an honest baseline, try true to compare
patience: 7                  # early-stopping epochs without val macro-F1 improvement

# Phase A — inference improvements (no retraining required)
tta: true                    # test-time augmentation over the D4 group (4 rotations × 2 flips)
                             # averages 8 softmax outputs; ~+1-2% macro-F1 at inference cost

# Phase C — focal loss retraining (change loss to "focal" when retraining)
loss: ce                     # ce | focal  (keep "ce" to reproduce original results)
focal_gamma: 2.0             # focal loss γ: higher = more focus on hard examples
